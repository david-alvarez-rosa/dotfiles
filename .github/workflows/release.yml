name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build source tarball
        run: |
          git archive --format=tar.gz --prefix="dotfiles-${GITHUB_REF_NAME}/" \
            -o "dotfiles-${GITHUB_REF_NAME}.tar.gz" "${GITHUB_REF_NAME}"

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dotfiles-*.tar.gz
