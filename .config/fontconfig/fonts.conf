<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>

  <!-- ============================================================
       1. Generic family preferences
       ============================================================ -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Arial</family>
      <family>DejaVu Sans</family>
      <family>Liberation Sans</family>
      <family>Noto Sans</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Times New Roman</family>
      <family>DejaVu Serif</family>
      <family>Liberation Serif</family>
      <family>Noto Serif</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Hack</family>
      <family>Noto Color Emoji</family>
      <family>Font Awesome</family>
      <family>Noto Mono Nerd Font</family>
      <family>DejaVu Sans Mono</family>
      <family>Liberation Mono</family>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>

  <!-- ============================================================
       1b. Force Windows-standard primaries (strong binding)
       The <prefer> lists above use weak binding and LOSE to the
       system /etc/fonts 60-latin.conf defaults (DejaVu), so bare
       sans-serif / serif / Helvetica sites have been rendering in
       DejaVu. A strong prepend forces Arial / Times New Roman to
       win — matching Windows. Glyphs Arial/Times lack (CJK, etc.)
       still fall through to the weak fallbacks above (DejaVu/Noto).
       Helvetica(/Neue) -> Arial, exactly as on Windows where
       Helvetica isn't installed and stacks fall to Arial.
       ============================================================ -->
  <match target="pattern">
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Arial</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Times New Roman</string></edit>
  </match>
  <!-- Bare `monospace` was also losing to DejaVu; force your Hack
       preference (used by terminal/editors). Web code stacks
       (ui-monospace, Menlo, …) still map to Consolas in section 3. -->
  <match target="pattern">
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Hack</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Helvetica</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Arial</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Helvetica Neue</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Arial</string></edit>
  </match>

  <!-- ============================================================
       2. System-UI font stacks (Windows-standard look)
       Modern sites use: -apple-system, BlinkMacSystemFont,
       "Segoe UI", system-ui, ...  Without these mappings they
       fall through to Arial/DejaVu, which is why Linux looks
       different. We target the Windows look (what most web
       traffic sees and what designers tune fallbacks against):
       the system tokens resolve to Inter (clean, screen-optimised
       modern UI font), with SF Pro Text as fallback. NOTE: Firefox
       resolves the bare `system-ui` generic via the GTK/desktop
       font (gsettings font-name), NOT this fontconfig alias, so the
       desktop font is also set to "Inter 11" to keep system-ui
       -first sites (e.g. LinkedIn) consistent.

       These use <match>+strong prepend rather than <alias>/<prefer>
       because 48-guessfamily.conf rewrites the CSS generics
       (system-ui, ui-*) before our config loads; a strong prepend
       forces our font to the front of the family list and wins.
       ============================================================ -->
  <match target="pattern">
    <test name="family"><string>system-ui</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Inter</string>
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>ui-sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Inter</string>
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>-apple-system</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Inter</string>
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>BlinkMacSystemFont</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Inter</string>
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>San Francisco</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>SF Pro</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>

  <!-- Windows Segoe UI -> Inter (clean modern UI font); Selawik fallback -->
  <match target="pattern">
    <test name="family"><string>Segoe UI</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Inter</string>
      <string>SF Pro Text</string>
    </edit>
  </match>

  <!-- ============================================================
       3. Monospace UI stacks
       Fixes the bug where ui-monospace / Menlo / SF Mono fell
       through to Arial. Map them to a real mono font.
       ============================================================ -->
  <match target="pattern">
    <test name="family"><string>ui-monospace</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Consolas</string>
      <string>Hack</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>SFMono-Regular</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Consolas</string>
      <string>Hack</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>SF Mono</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Consolas</string>
      <string>Hack</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Menlo</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Consolas</string>
      <string>Hack</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Monaco</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Consolas</string>
      <string>Hack</string>
    </edit>
  </match>

  <!-- ============================================================
       4. Rendering: slight hinting + LCD subpixel
       ============================================================ -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <!-- autohint deliberately left OFF (fontconfig default). hintslight already
         applies the autohinter vertical-only for TTF and keeps each font's
         native hints for CFF/OTF (e.g. SF Pro). Forcing autohint=true discarded
         those superior native hints (Arch Wiki: "strongly sub-optimal for fonts
         with good hinting information"). -->
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>
</fontconfig>
